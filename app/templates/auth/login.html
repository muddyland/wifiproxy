<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – WiFi Bridge</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
</head>
<body class="login-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card card shadow-lg p-4" style="width: 100%; max-width: 380px;">
    <div class="text-center mb-4">
      <i class="fa-solid fa-wifi fa-3x text-primary mb-3"></i>
      <h4 class="fw-bold">WiFi Bridge</h4>
      <p class="text-muted small">Sign in to manage your device</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label small fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-user text-muted"></i></span>
          <input type="text" name="username" class="form-control" autocomplete="username"
                 autofocus required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control" autocomplete="current-password" required>
          <button class="btn btn-outline-secondary" type="button" id="toggle-pw">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="mb-4 form-check">
        <input type="checkbox" class="form-check-input" id="remember" name="remember">
        <label class="form-check-label small" for="remember">Remember me</label>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('toggle-pw').addEventListener('click', function() {
      const pw = document.querySelector('input[name="password"]');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pw.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });
  </script>
</body>
</html>
